name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for ThreatLens? We'd love to hear it!
  - type: textarea
    id: problem
    attributes:
      label: Problem or Motivation
      description: What problem does this solve? Why is it needed?
      placeholder: I often need to...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work? What would the API or output look like?
      placeholder: It would be great if...
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - STRIDE analysis
        - DREAD scoring
        - LINDDUN privacy
        - PASTA modeling
        - Attack trees
        - CWE/MITRE mapping
        - Report generation
        - MCP server / integration
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any other approaches you've considered?
