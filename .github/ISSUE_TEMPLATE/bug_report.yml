name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the details below.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
      placeholder: Describe the bug...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue
      placeholder: |
        1. Run `threatprism ...`
        2. Call tool `analyze_threats` with ...
        3. See error ...
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python Version
      placeholder: "3.12"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "macOS 15, Ubuntu 24.04, Windows 11"
    validations:
      required: true
  - type: input
    id: client
    attributes:
      label: MCP Client
      description: Which client are you using?
      placeholder: "Claude Desktop, VS Code Copilot, Cursor, etc."
  - type: textarea
    id: logs
    attributes:
      label: Error Output / Logs
      description: Paste any error messages or stack traces
      render: shell
